name: Tests

on:
  push:

jobs:
  router:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: router
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

  audio-syntax:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: audio
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Syntax check audio_proxy.py
        run: python3 -c "import ast; ast.parse(open('audio_proxy.py').read())"

      - name: Test pick_realtime_subprotocol
        run: |
          python3 - <<'EOF'
          import sys, types
          for m in ['fastapi', 'fastapi.responses', 'httpx', 'websockets', 'websockets.exceptions']:
              sys.modules.setdefault(m, types.ModuleType(m))
          sys.modules['fastapi'].FastAPI = lambda **kw: types.SimpleNamespace(post=lambda *a,**k:lambda f:f, get=lambda *a,**k:lambda f:f, websocket=lambda *a,**k:lambda f:f)
          for name in ['Request','WebSocket']:
              setattr(sys.modules['fastapi'], name, object)
          sys.modules['fastapi'].HTTPException = type('HTTPException',(Exception,),{})
          sys.modules['fastapi'].WebSocketDisconnect = type('WebSocketDisconnect',(Exception,),{})
          for name in ['JSONResponse','StreamingResponse','PlainTextResponse']:
              setattr(sys.modules['fastapi.responses'], name, object)
          sys.modules['websockets'].connect = None
          sys.modules['websockets.exceptions'].ConnectionClosed = type('ConnectionClosed',(Exception,),{})
          sys.modules['httpx'].AsyncClient = object
          sys.modules['httpx'].RequestError = type('RequestError',(Exception,),{})
          sys.modules['httpx'].Timeout = lambda *a,**k: None

          import importlib.util
          spec = importlib.util.spec_from_file_location("ap", "audio_proxy.py")
          m = importlib.util.module_from_spec(spec); spec.loader.exec_module(m)

          cases = [
              (["realtime","openai-insecure-api-key.tk_x"], "realtime"),
              (["openai-insecure-api-key.tk_x"], None),
              ([], None),
              (None, None),
              (["foo","realtime"], "realtime"),
              (["foo","bar"], "foo"),
              (["realtime","openai-insecure-api-key.tk_x","openai-organization.org_y","openai-project.proj_z"], "realtime"),
          ]
          ok = True
          for offered, expected in cases:
              got = m.pick_realtime_subprotocol(offered)
              status = "PASS" if got == expected else "FAIL"
              if status == "FAIL": ok = False
              print(f"{status}: offered={offered!r} -> {got!r} (expected {expected!r})")
          sys.exit(0 if ok else 1)
          EOF
