cvm-version: 0.7.5
memory: 131072
cpus: 16
gpus: 1

models:
  - name: "qwen3-tts"
    repo: "Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice@0c0e3051f131929182e2c023b9537f8b1c68adfe"
    mpk: "6d350aa3684da02b2f59157fc11b7c5ea487fa265e98ca1c1dd74cf31ac2fa7e_4520226816_7dc41474-aac5-50bd-bcd5-ffff26ccad57"
  - name: "voxtral-tts"
    repo: "mistralai/Voxtral-4B-TTS-2603@b81be46c3777f88621676791b512bb01dc1cb970"
    mpk: "8f7b7407c2bd621160a89d5c3ed845baecd2912850aceca2ad264f06442f471b_8037642240_6b9c8976-212b-5927-b9ff-945a64178b46"
  - name: "voxtral-mini-4b-realtime"
    repo: "mistralai/Voxtral-Mini-4B-Realtime-2602@2769294da9567371363522aac9bbcfdd19447add"
    mpk: "b451a321f0da47d9a1d582d3fc46a0ef981de7617aa9e542b8252face85d8bb2_17733844992_af6fc86c-43cf-534e-bb79-9fcfb7403a17"

containers:
  - name: "router"
    image: "ghcr.io/tinfoilsh/confidential-realtime-models@sha256:3beb9803131fea43a9525b7bf6ae32dc78340d48d93a4cdc6ea59abac13195a4" # v0.0.4
    restart: always
    env:
      - LISTEN_ADDR: ":8080"
      - DOMAIN
      - QWEN_TTS_URL: "http://127.0.0.1:8505"
      - VOXTRAL_TTS_URL: "http://127.0.0.1:8605"
      - VOXTRAL_MINI_REALTIME_URL: "http://127.0.0.1:8401"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 1m

  - name: "voxtral-mini-4b-realtime"
    image: "ghcr.io/tinfoilsh/confidential-realtime-models-omni@sha256:ad7686ce3c587c77073f7af74fbbfecf969989fc897f66dd1b95935f03bf7bcb" # v0.0.4
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    entrypoint: ["vllm", "serve"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8401/health"]
      interval: 30s
      timeout: 5s
      start_period: 5m
    command: [
      "--model", "/tinfoil/mpk/mpk-b451a321f0da47d9a1d582d3fc46a0ef981de7617aa9e542b8252face85d8bb2",
      "--served-model-name", "voxtral-mini-4b-realtime",
      "--tokenizer-mode", "mistral",
      "--config-format", "mistral",
      "--load-format", "mistral",
      "--trust-remote-code",
      "--compilation-config", "{\"cudagraph_mode\":\"PIECEWISE\"}",
      "--tensor-parallel-size", "1",
      "--max-model-len", "16000",
      "--max-num-batched-tokens", "8192",
      "--max-num-seqs", "16",
      "--gpu-memory-utilization", "0.20",
      "--kv-cache-memory-bytes", "17179869184",
      "--port", "8401",
      "--host", "0.0.0.0"
    ]

  - name: "qwen3-tts"
    image: "ghcr.io/tinfoilsh/confidential-realtime-models-omni@sha256:ad7686ce3c587c77073f7af74fbbfecf969989fc897f66dd1b95935f03bf7bcb" # v0.0.4
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    entrypoint: ["/bin/sh", "-c"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8505/health"]
      interval: 30s
      timeout: 5s
      start_period: 5m
    command: [
      "ln -s /tinfoil/mpk/mpk-6d350aa3684da02b2f59157fc11b7c5ea487fa265e98ca1c1dd74cf31ac2fa7e /tmp/model-CustomVoice && exec vllm serve /tmp/model-CustomVoice --stage-configs-path /opt/realtime-configs/qwen3_tts_realtime.yaml --port 8505 --host 0.0.0.0 --trust-remote-code --enforce-eager --omni --served-model-name qwen3-tts"
    ]

  - name: "voxtral-tts"
    image: "ghcr.io/tinfoilsh/confidential-realtime-models-omni@sha256:ad7686ce3c587c77073f7af74fbbfecf969989fc897f66dd1b95935f03bf7bcb" # v0.0.4
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    entrypoint: ["/bin/sh", "-c"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8605/health"]
      interval: 30s
      timeout: 5s
      start_period: 5m
    command: [
      "ln -s /tinfoil/mpk/mpk-8f7b7407c2bd621160a89d5c3ed845baecd2912850aceca2ad264f06442f471b /tmp/model-VoxtralTTS && exec vllm serve /tmp/model-VoxtralTTS --stage-configs-path /opt/realtime-configs/voxtral_tts_realtime.yaml --port 8605 --host 0.0.0.0 --trust-remote-code --enforce-eager --omni --tokenizer-mode mistral --config-format mistral --load-format mistral --served-model-name voxtral-tts"
    ]

shim:
  listen-port: 443
  upstream-port: 8080
  tls-wildcard: true
  authenticated: true
  authenticated-endpoints:
    - /v1/audio/speech
    - /v1/realtime
  paths:
    - /health
    - /metrics
    - /v1/audio/speech
    - /v1/realtime
